services:
  agent:
    build: ./agent
    restart: unless-stopped
    environment:
      - LIVEKIT_URL
      - LIVEKIT_API_KEY
      - LIVEKIT_API_SECRET
      - DEEPGRAM_API_KEY
      - ANTHROPIC_API_KEY
      - ELEVENLABS_API_KEY

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LIVEKIT_URL
      - LIVEKIT_API_KEY
      - LIVEKIT_API_SECRET
      - ALLOW_ORIGIN=${ALLOW_ORIGIN:-*}
